<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionPrime — Video Conference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Lobby / Join Page -->
    <div id="lobbyPage" class="lobby-page">
        <div class="lobby-card">
            <div class="lobby-header">
                <div class="brand-logo">
                    <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#58a6ff"/>
                                <stop offset="50%" style="stop-color:#a855f7"/>
                                <stop offset="100%" style="stop-color:#ec4899"/>
                            </linearGradient>
                            <linearGradient id="innerGradient" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#06b6d4"/>
                                <stop offset="100%" style="stop-color:#8b5cf6"/>
                            </linearGradient>
                        </defs>
                        <!-- Outer eye shape -->
                        <path d="M32 8C18 8 6 20 2 32c4 12 16 24 30 24s26-12 30-24C58 20 46 8 32 8z" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Inner iris circle -->
                        <circle cx="32" cy="32" r="12" stroke="url(#innerGradient)" stroke-width="2.5" fill="none"/>
                        <!-- Pupil with play button -->
                        <circle cx="32" cy="32" r="6" fill="url(#logoGradient)"/>
                        <!-- Play triangle in pupil -->
                        <path d="M30 29l5 3-5 3z" fill="#ffffff"/>
                        <!-- Vision rays -->
                        <path d="M10 32h6M48 32h6" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                        <path d="M14 20l4 3M46 20l-4 3M14 44l4-3M46 44l-4-3" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                    </svg>
                </div>
                <h1 class="lobby-title">VisionPrime</h1>
                <p class="lobby-subtitle">Connect seamlessly with crystal-clear video calls</p>
            </div>
            <form id="lobbyForm" class="lobby-form">
                <div class="form-group">
                    <label for="nameInput" class="form-label">Your Name</label>
                    <input type="text" id="nameInput" class="form-input" placeholder="Enter your name" maxlength="32" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="roomInput" class="form-label">Room ID</label>
                    <input type="text" id="roomInput" class="form-input" placeholder="Enter room ID" maxlength="32" required autocomplete="off">
                </div>
                <button type="submit" id="joinBtn" class="btn btn-primary btn-join">Join Room</button>
            </form>
        </div>
    </div>

    <!-- Conference Room (hidden initially) -->
    <div id="conferencePage" class="app" style="display: none;">
        <header class="app-header">
            <div class="app-header-inner">
                <h1 class="app-title">
                    <svg class="app-logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
                        <defs>
                            <linearGradient id="headerLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#58a6ff"/>
                                <stop offset="100%" style="stop-color:#a855f7"/>
                            </linearGradient>
                        </defs>
                        <path d="M32 8C18 8 6 20 2 32c4 12 16 24 30 24s26-12 30-24C58 20 46 8 32 8z" stroke="url(#headerLogoGradient)" stroke-width="3" fill="none"/>
                        <circle cx="32" cy="32" r="10" stroke="url(#headerLogoGradient)" stroke-width="2.5" fill="none"/>
                        <circle cx="32" cy="32" r="5" fill="url(#headerLogoGradient)"/>
                        <path d="M30.5 30l4 2-4 2z" fill="#ffffff"/>
                    </svg>
                    VisionPrime
                </h1>
                <div class="room-bar">
                    <span id="roomDisplay" class="room-display"></span>
                    <button type="button" id="leaveBtn" class="btn btn-leave">Leave</button>
                </div>
            </div>
        </header>

        <main class="app-main">
            <section class="videos-section">
                <div class="video-panel video-panel-local">
                    <div class="video-panel-header">
                        <span class="video-label" id="localDisplayName">You</span>
                        <span class="video-badge" id="hostBadge" style="display:none;">Host</span>
                        <button type="button" id="renameBtn" class="btn-rename" title="Change your name" style="display:none;">Rename</button>
                    </div>
                    <div class="video-wrap">
                        <video id="localVideo" autoplay playsinline muted></video>
                    </div>
                    <div class="video-controls">
                        <button type="button" id="muteBtn" class="btn-control" title="Mute / Unmute">
                            <span class="btn-icon icon-mic-on" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></span>
                            <span class="btn-icon icon-mic-off" aria-hidden="true" hidden><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/></svg></span>
                            <span class="btn-label">Mute</span>
                        </button>
                        <button type="button" id="cameraBtn" class="btn-control" title="Camera on / off">
                            <span class="btn-icon icon-camera-on" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
                            <span class="btn-icon icon-camera-off" aria-hidden="true" hidden><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 21H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h6l2 3h4a2 2 0 0 1 2 2v11z"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
                            <span class="btn-label">Camera Off</span>
                        </button>
                        <button type="button" id="shareScreenBtn" class="btn-control" title="Share your screen">
                            <span class="btn-icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                            <span class="btn-label">Share Screen</span>
                        </button>
                    </div>
                </div>

                <div class="video-panel video-panel-remotes">
                    <div class="video-panel-header">
                        <span class="video-label">Participants</span>
                        <span id="remoteStatus" class="video-status">Waiting for others…</span>
                    </div>
                    <div id="remoteVideosContainer" class="remote-videos"></div>
                </div>
            </section>

            <aside class="chat-section">
                <div class="chat-header">
                    <h2 class="chat-title">Chat</h2>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type a message…" disabled maxlength="2000">
                    <button type="button" id="sendBtn" class="btn btn-send" disabled>Send</button>
                </div>
            </aside>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
